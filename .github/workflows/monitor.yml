name: SSSK Monitor

on:
  schedule:
    # ============================================================
    # ТИМЧАСОВИЙ РЕЖИМ (відсутність відключень)
    # ============================================================
    # Пік (19:00 - 23:00 EEST / 17:00 - 21:00 UTC): кожні 15 хвилин
    - cron: '*/15 17-20 * * *'
    # Решта доби: кожні 5 годин (0:00, 5:00, 10:00, 15:00 UTC)
    - cron: '0 0,5,10,15 * * *'

    # ============================================================
    # СТАНДАРТНИЙ РЕЖИМ (при активних відключеннях) — розкоментувати
    # ============================================================
    # # Вечірній пік (19:00-24:00 EEST / 17:00-22:00 UTC): кожні 5 хв
    # - cron: '*/5 17-21 * * *'
    # # Нічний режим (00:00-09:00 EEST / 22:00-07:00 UTC): кожні 3 год
    # - cron: '0 22,1,4,7 * * *'
    # # Денний режим (09:00-19:00 EEST / 07:00-17:00 UTC): кожні 3 год
    # - cron: '0 7,10,13,16 * * *'
  
  workflow_dispatch:
    inputs:
      source:
        description: 'Джерело парсингу'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - site
          - telegram
      override_interval:
        description: 'Форсований інтервал (хвилини, 0 - вимкнено)'
        required: false
        default: '0'
      override_duration:
        description: 'Тривалість форсованого режиму (години)'
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev tesseract-ocr-ukr

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install Pillow requests pytz beautifulsoup4 lxml pytesseract

      - name: Run parser
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Передаємо інпути в скрипт через змінні середовища
          OVERRIDE_SOURCE: ${{ github.event.inputs.source }}
          OVERRIDE_INTERVAL: ${{ github.event.inputs.override_interval }}
          OVERRIDE_DURATION: ${{ github.event.inputs.override_duration }}
        run: python parser/src/parse_schedule.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Додаємо лише існуючі файли, щоб уникнути помилок pathspec
          git add parser/data/*.json 2>/dev/null || true
          git add parser/data/raw_site/*.png 2>/dev/null || true
          git add parser/data/raw_telegram/*.png 2>/dev/null || true
          git add parser/data/logs/*.txt 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Parser: Update data and state" && git push)
