name: SSSK Monitor

on:
  schedule:
    # Оновлення щогодини (на початку кожної години)
    - cron: '0 * * * *'

    # СТАНДАРТНИЙ РЕЖИМ (при активних відключеннях) — розкоментувати
    # Вечірній пік (19:00-24:00 EEST / 17:00-22:00 UTC): кожні 5 хв
    # - cron: '*/5 17-21 * * *'
    # Нічний режим (00:00-09:00 EEST / 22:00-07:00 UTC): кожні 3 год
    # - cron: '0 22,1,4,7 * * *'
    # Денний режим (09:00-19:00 EEST / 07:00-17:00 UTC): кожні 3 год
    # - cron: '0 7,10,13,16 * * *'

  workflow_dispatch:
    inputs:
      source:
        description: 'Джерело парсингу'
        required: true
        default: 'site'
        type: choice
        options:
          - site
          - archive
      override_interval:
        description: 'Форсований інтервал (хвилини, 0 - вимкнено)'
        required: false
        default: '0'
      override_duration:
        description: 'Тривалість форсованого режиму (години)'
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev tesseract-ocr-ukr

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r parser/requirements.txt
          playwright install chromium --with-deps

      - name: Run parser
        env:
          OVERRIDE_SOURCE: ${{ github.event.inputs.source || 'site' }}
          OVERRIDE_INTERVAL: ${{ github.event.inputs.override_interval || '0' }}
          OVERRIDE_DURATION: ${{ github.event.inputs.override_duration || '1' }}
        run: |
          python parser/src/parse_schedule.py
          git config --global user.name "Parser Bot"
          git config --global user.email "bot@sssk.ua"
          git add parser/data/*.json 2>/dev/null || true
          git add parser/data/logs/*.txt 2>/dev/null || true
          git add pwa/data/*.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Parser: Update data and health status" && git push)
