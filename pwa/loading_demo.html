<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulb Animation Demo (Restored Connections)</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            color: white;
            flex-direction: column;
        }

        .container {
            position: relative;
            width: 512px;
            height: 512px;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        #spark-path {
            stroke-dasharray: 1000 1730;
            stroke-dashoffset: 1730;
            animation: spark-loop 2.5s ease-in-out forwards;
        }

        @keyframes spark-loop {
            from {
                stroke-dashoffset: 1730;
            }
            to {
                stroke-dashoffset: -1730;
            }
        }

        .controls {
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            background-color: #374151;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #4B5563;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 1. Unified Background Outlines (Light Gray) -->
            <path d="M171.91 356H244.66V278.23C204.38 270.82 189.03 233.61 193.14 195.47C179.44 195.42 179.44 174.57 193.14 174.52H214.09V143.09C214.09 137.3 218.77 132.61 224.57 132.61C230.37 132.61 235.05 137.29 235.05 143.09V174.52H276.95V143.09C276.95 137.3 281.63 132.61 287.43 132.61C293.23 132.61 297.91 137.29 297.91 143.09V174.52H318.86C332.56 174.57 332.56 195.42 318.86 195.47C322.98 233.61 307.59 270.84 267.34 278.23V356H340.09C346.17 337.42 358.34 320.58 372.09 306.08C468.46 211.41 393.29 31.22 256.01 36C118.69 31.25 43.56 211.41 139.92 306.09C153.66 320.59 165.91 337.42 171.91 356Z" 
                stroke="#D1D5DB" stroke-width="4" stroke-opacity="1" fill="none"/>
            <path d="M336 409.33C334.83 508.55 159.82 495.2 176 396H336V409.33Z" 
                stroke="#D1D5DB" stroke-width="4" stroke-linecap="round" fill="none"/>
            
            <!-- 2. Spark Path -->
            <path id="spark-path" d="M267.34 356H340.09C346.17 337.42 358.34 320.58 372.09 306.08C468.46 211.41 393.29 31.22 256.01 36C118.69 31.25 43.56 211.41 139.92 306.09C153.66 320.59 165.91 337.42 171.91 356H244.66V278.23C204.38 270.82 189.03 233.61 193.14 195.47C179.44 195.42 179.44 174.57 193.14 174.52H214.09V143.09C214.09 137.3 218.77 132.61 224.57 132.61C230.37 132.61 235.05 137.29 235.05 143.09V174.52H276.95V143.09C276.95 137.3 281.63 132.61 287.43 132.61C293.23 132.61 297.91 137.29 297.91 143.09V174.52H318.86C332.56 174.57 332.56 195.42 318.86 195.47C322.98 233.61 307.59 270.84 267.34 278.23V356" 
                stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
    </div>
    <div class="controls">
        <button onclick="location.reload()">Re-run Animation</button>
    </div>
</body>
</html>
