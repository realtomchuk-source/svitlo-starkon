<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: linear-gradient(45deg, #1a1a1a, #4a4a4a); color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .test-box { display: inline-block; margin: 20px; padding: 20px; border: 1px solid #555; border-radius: 12px; background: repeating-conic-gradient(#333 0% 25%, #444 0% 50%) 50% / 20px 20px; }
        img { width: 150px; display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Тест прозрачности (Transparency Test)</h2>
    <p>Если в центре вилки видна шахматная сетка — значит вырез работает!</p>
    
    <div class="test-box">
        <caption>power_on.png</caption>
        <img src="assets/power_on.png">
    </div>
    
    <div class="test-box">
        <caption>power_off.png</caption>
        <img src="assets/power_off.png">
    </div>
</body>
</html>
