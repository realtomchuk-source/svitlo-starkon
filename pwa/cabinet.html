<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Світло-Старкон | Особистий кабінет</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Cabinet Specific Styles */
        .profile-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
        }

        .profile-avatar-square {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            border: 1px solid rgba(128, 128, 128, 0.2);
            overflow: hidden;
            flex-shrink: 0;
            background: #f5f5f5;
        }

        .profile-details {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .push-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(128, 128, 128, 0.1);
        }

        .push-row:last-child {
            border-bottom: none;
        }

        .btn-location-delete {
            background: rgba(255, 59, 48, 0.1);
            color: #FF3B30;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .btn-location-delete:active {
            transform: scale(0.9);
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="glass-header">
            <h1 class="headline-hero">Особистий кабінет</h1>
        </div>

        <main class="content-area">
            <section id="cabinet-section" style="padding-top: 10px;">
                
                <!-- Profile Card (Passport Style) -->
                <div class="glass-card fade-in profile-card" style="margin-bottom: 32px;">
                    <div class="profile-avatar-square">
                        <img id="user-avatar" src="https://ui-avatars.com/api/?name=Guest&background=e0e0e0&color=666"
                            alt="Avatar" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    
                    <div class="profile-details">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <h2 id="user-name" class="subheadline" style="margin: 0;">Гість</h2>
                            <span class="pro-badge">Free</span>
                        </div>
                        
                        <button id="btn-google-auth" class="btn-google"
                            style="margin-top: 8px; width: 100%; padding: 10px 16px; font-size: 14px;">
                            <svg width="16" height="16" viewBox="0 0 18 18" style="margin-right: -4px;">
                                <path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.49h4.84c-.21 1.12-.84 2.07-1.79 2.7l2.86 2.22c1.67-1.54 2.63-3.81 2.63-6.57z" fill="#4285F4" />
                                <path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.86-2.22c-.79.53-1.8.85-3.1.85-2.39 0-4.41-1.61-5.14-3.78H.95v2.33C2.43 15.93 5.48 18 9 18z" fill="#34A853" />
                                <path d="M3.86 10.67c-.19-.53-.3-1.1-.3-1.67s.11-1.14.3-1.67V5.01H.95c-.65 1.25-1.02 2.66-1.02 4.14s.37 2.89 1.02 4.14l2.91-2.48z" fill="#FBBC05" />
                                <path d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.47.8 11.43 0 9 0 5.48 0 2.43 2.07.95 5.01l2.91 2.48c.73-2.17 2.75-3.78 5.14-3.78z" fill="#EA4335" />
                            </svg>
                            Увійти через Google
                        </button>

                        <div style="display: flex; align-items: center; margin: 8px 0;">
                            <hr style="flex: 1; border: none; border-top: 1px solid rgba(128,128,128,0.1);">
                            <span style="padding: 0 10px; font-size: 12px; color: var(--system-text-neutral); font-weight: 500;">або</span>
                            <hr style="flex: 1; border: none; border-top: 1px solid rgba(128,128,128,0.1);">
                        </div>
                        
                        <button class="btn-telegram" style="width: 100%; padding: 10px 16px; display: flex; justify-content: center; align-items: center; gap: 8px; background: #2AABEE; color: white; border: none; border-radius: 100px; font-weight: 500; font-size: 14px; cursor: pointer; box-shadow: 0 4px 12px rgba(42,171,238,0.3);" onclick="window.location.href='#'">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="white" style="margin-right: -4px;">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.69-.52.36-.99.53-1.39.52-.45-.01-1.31-.25-1.95-.45-.78-.25-1.4-.38-1.34-.81.06-.44.7-.89 1.94-1.35 1.48-.54 7.6-3.3 12.67-5.48 15.2-6.55.72-.3 1.5-.42 2.04-.42.54 0 1.26.13 1.8.52.4.3.4.6.4.82z" />
                            </svg>
                            Увійти через Telegram
                        </button>
                    </div>
                </div>

                <!-- Control Center: My Locations -->
                <div id="section-subscriptions" class="fade-in" style="animation-delay: 0.1s;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div class="section-icon-bg" style="width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: rgba(128,128,128,0.1);">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                            </div>
                            <h2 class="subheadline" style="margin: 0; font-size: 18px;">Мої локації</h2>
                        </div>
                    </div>
                    
                    <div id="subscriptions-list" style="display: flex; flex-direction: column; gap: 16px;">
                        <!-- Location Card 1 -->
                        <div class="glass-card" style="padding: 0; overflow: hidden;">
                            <div style="display: flex; justify-content: space-between; align-items: center; padding: 16px; background: rgba(128,128,128,0.05); border-bottom: 1px solid rgba(128,128,128,0.1);">
                                <div>
                                    <h3 style="margin: 0; font-size: 16px; font-weight: 600;">Дім</h3>
                                    <p class="body-neutral" style="margin: 2px 0 0 0; font-size: 13px;">Черга 5.2</p>
                                </div>
                                <button class="btn-location-delete">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/>
                                    </svg>
                                </button>
                            </div>
                            <!-- Nested Toggles -->
                            <div class="push-row">
                                <span style="font-size: 14px; font-weight: 500;">За 15 хв до відключення</span>
                                <label class="ios-toggle">
                                    <input type="checkbox" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="push-row">
                                <span style="font-size: 14px; font-weight: 500;">Коли світло з'явилося</span>
                                <label class="ios-toggle">
                                    <input type="checkbox">
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>

                        <!-- Add Location Button -->
                        <button id="btn-add-location" class="glass-card dashed-border"
                            style="width: 100%; padding: 16px; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; color: var(--system-text-neutral);">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Додати нову адресу
                        </button>
                    </div>
                </div>


            </section>
        </main>
        
        <div style="height: 100px;"></div>

        <nav class="glass-nav">
            <button class="nav-item  focus-ring" onclick="window.location.href='index.html'">
                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
                <span class="nav-text">Home</span>
            </button>
            <button class="nav-item  focus-ring" onclick="window.location.href='full_schedule.html'">
                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg></span>
                <span class="nav-text">Graph</span>
            </button>
            <button class="nav-item  focus-ring" onclick="window.location.href='javascript:void(0)'">
                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg></span>
                <span class="nav-text">App</span>
            </button>
            <button class="nav-item active focus-ring" onclick="window.location.href='cabinet.html'">
                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                <span class="nav-text">Profile</span>
            </button>
        </nav>

        <!-- Push Wizard Overlay -->
        <div id="push-wizard-overlay" class="overlay" style="display: none;">
            <div id="push-wizard-sheet" class="glass-card bottom-sheet" style="padding: 24px 20px;">
                <div class="sheet-handle"></div>
                
                <!-- Wizard Header -->
                <div style="text-align: center; margin-bottom: 24px;">
                    <div style="display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 48px; border-radius: 12px; background: rgba(128,128,128,0.1); margin-bottom: 12px;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                    </div>
                    <h2 class="headline" id="wizard-title" style="margin: 0; font-size: 20px;">Налаштуймо сповіщення</h2>
                    <p class="body-neutral" id="wizard-subtitle" style="margin: 4px 0 0 0; font-size: 14px;">Крок 1 з 3</p>
                </div>

                <!-- Wizard Content Area -->
                <div id="wizard-content" style="min-height: 180px;">
                    <!-- Step 1: Select Queue -->
                    <div id="wizard-step-1" class="wizard-step active-step">
                        <p style="font-weight: 600; margin-bottom: 12px;">Оберіть вашу чергу:</p>
                        <div class="group-grid" id="wizard-group-grid">
                            <!-- JS Will Inject Queue Buttons Here -->
                        </div>
                    </div>

                    <!-- Step 2: Time Config -->
                    <div id="wizard-step-2" class="wizard-step" style="display: none;">
                        <p style="font-weight: 600; margin-bottom: 12px;">Коли вас попередити про вимкнення?</p>
                        <div style="display: flex; flex-direction: column; gap: 12px;">
                            <label class="glass-card" style="display: flex; align-items: center; gap: 12px; padding: 16px; cursor: pointer; border: 1px solid var(--system-accent);">
                                <input type="radio" name="notify_time" value="15" checked style="accent-color: var(--system-accent);">
                                <span style="font-weight: 500;">За 15 хвилин</span>
                            </label>
                            <label class="glass-card" style="display: flex; align-items: center; gap: 12px; padding: 16px; cursor: pointer;">
                                <input type="radio" name="notify_time" value="5" style="accent-color: var(--system-accent);">
                                <span style="font-weight: 500;">За 5 хвилин</span>
                            </label>
                        </div>
                    </div>

                    <!-- Step 3: Power On Config -->
                    <div id="wizard-step-3" class="wizard-step" style="display: none;">
                        <p style="font-weight: 600; margin-bottom: 16px;">Сповіщати, коли світло з'явилося?</p>
                        <div class="glass-card" style="display: flex; justify-content: space-between; align-items: center; padding: 16px;">
                            <span style="font-weight: 500;">Коли є світло</span>
                            <label class="ios-toggle">
                                <input type="checkbox" id="wizard-power-on" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Wizard Controls -->
                <div style="display: flex; gap: 12px; margin-top: 24px;">
                    <button id="btn-wizard-back" class="glass-card" style="flex: 1; padding: 16px; display: none; font-weight: 600; text-align: center; border: 1px solid rgba(128,128,128,0.2); cursor: pointer; background: transparent;">Назад</button>
                    <button id="btn-wizard-next" class="action-btn" style="flex: 2; padding: 16px; font-size: 16px; border-radius: 16px;">Далі</button>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script type="module" src="js/pages/cabinet.js"></script>
</body>

</html>
