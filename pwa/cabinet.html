<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Світло-Старкон | Особистий кабінет</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/cabinet-v3.css">
</head>

<body>
    <div id="app">
        <main class="content-area">
            <section id="cabinet-section-v3" class="cabinet-container-v3">
                <div id="v3-profile-slot" class="v3-section">
                    <!-- Dynamic Profile Header -->
                </div>

                <div class="v3-section">
                    <h3 class="v3-section-title">Налаштування сповіщень</h3>
                    <div id="v3-slots-container" class="v3-cards-container">
                        <!-- Dynamic Notification Cards (Always 2) -->
                    </div>
                </div>

                <div class="cabinet-section">
                    <div class="soft-container">
                        <!-- Стартова підчерга -->
                        <div class="soft-item" onclick="window.v3OpenStartQueue()">
                            <div class="soft-left">
                                <svg class="soft-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                                <div class="soft-label">Стартова підчерга</div>
                            </div>
                            <div style="display:flex; align-items:center;">
                                <div id="v3-sq-value" class="soft-value">--</div>
                                <div class="soft-chevron">›</div>
                            </div>
                        </div>
                        <!-- Графік на завтра -->
                        <div class="soft-item" onclick="window.v3ToggleTomorrow()">
                            <div class="soft-left">
                                <svg class="soft-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                <div class="soft-label">Графік на завтра</div>
                            </div>
                            <div id="v3-tomorrow-toggle" class="v3-toggle"></div>
                        </div>
                    </div>
                </div>

                <div class="cabinet-section">
                    <div class="light-list">
                        <div class="light-item" onclick="window.v3OpenAbout()">
                            <div class="light-left">
                                <svg class="light-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                                <div class="light-label">Про застосунок</div>
                            </div>
                            <div class="light-chevron">›</div>
                        </div>
                        <div class="light-item share" id="v3-share-btn" onclick="window.v3ShareApp()">
                            <div class="light-left">
                                <svg class="light-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                                <div class="light-label">Поділитись</div>
                            </div>
                            <div class="light-chevron">›</div>
                        </div>
                        <div class="light-item" onclick="window.v3OpenFeedback()">
                            <div class="light-left">
                                <svg class="light-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                                <div class="light-label">Зворотний зв'язок</div>
                            </div>
                            <div class="light-chevron">›</div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <div style="height: 100px;"></div>

        <nav class="glass-nav">
            <button class="nav-item  focus-ring" onclick="window.location.href='index.html'">
                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="24" height="24"
                        fill="currentColor">
                        <path
                            d="M341.8 72.6C329.5 61.2 310.5 61.2 298.3 72.6L74.3 280.6C64.7 289.6 61.5 303.5 66.3 315.7C71.1 327.9 82.8 336 96 336L112 336L112 512C112 547.3 140.7 576 176 576L464 576C499.3 576 528 547.3 528 512L528 336L544 336C557.2 336 569 327.9 573.8 315.7C578.6 303.5 575.4 289.5 565.8 280.6L341.8 72.6zM304 384L336 384C362.5 384 384 405.5 384 432L384 528L256 528L256 432C256 405.5 277.5 384 304 384z" />
                    </svg></span>
                <span class="nav-text">Home</span>
            </button>
            <button class="nav-item  focus-ring" onclick="window.location.href='full_schedule.html'">
                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="24" height="24"
                        fill="currentColor">
                        <path
                            d="M224 64C241.7 64 256 78.3 256 96L256 128L384 128L384 96C384 78.3 398.3 64 416 64C433.7 64 448 78.3 448 96L448 128L480 128C515.3 128 544 156.7 544 192L544 480C544 515.3 515.3 544 480 544L160 544C124.7 544 96 515.3 96 480L96 192C96 156.7 124.7 128 160 128L192 128L192 96C192 78.3 206.3 64 224 64zM160 304L160 336C160 344.8 167.2 352 176 352L208 352C216.8 352 224 344.8 224 336L224 304C224 295.2 216.8 288 208 288L176 288C167.2 288 160 295.2 160 304zM288 304L288 336C288 344.8 295.2 352 304 352L336 352C344.8 352 352 344.8 352 336L352 304C352 295.2 344.8 288 336 288L304 288C295.2 288 288 295.2 288 304zM432 288C423.2 288 416 295.2 416 304L416 336C416 344.8 423.2 352 432 352L464 352C472.8 352 480 344.8 480 336L480 304C480 295.2 472.8 288 464 288L432 288zM160 432L160 464C160 472.8 167.2 480 176 480L208 480C216.8 480 224 472.8 224 464L224 432C224 423.2 216.8 416 208 416L176 416C167.2 416 160 423.2 160 432zM304 416C295.2 416 288 423.2 288 432L288 464C288 472.8 295.2 480 304 480L336 480C344.8 480 352 472.8 352 464L352 432C352 423.2 344.8 416 336 416L304 416zM416 432L416 464C416 472.8 423.2 480 432 480L464 480C472.8 480 480 472.8 480 464L480 432C480 423.2 472.8 416 464 416L432 416C423.2 416 416 423.2 416 432z" />
                    </svg></span>
                <span class="nav-text">Archive</span>
            </button>
            <button class="nav-item  focus-ring" onclick="window.location.href='apps.html'">
                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512" width="18" height="24"
                        fill="currentColor">
                        <path
                            d="M64 0C28.7 0 0 28.7 0 64L0 480c0 11.5 6.2 22.2 16.2 27.8s22.3 5.5 32.2-.4L192 421.3 335.5 507.4c9.9 5.9 22.2 6.1 32.2 .4S384 491.5 384 480l0-416c0-35.3-28.7-64-64-64L64 0z" />
                    </svg></span>
                <span class="nav-text">App</span>
            </button>
            <button class="nav-item active focus-ring" onclick="window.location.href='cabinet.html'">
                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="24" height="24"
                        fill="currentColor">
                        <path
                            d="M320 312C386.3 312 440 258.3 440 192C440 125.7 386.3 72 320 72C253.7 72 200 125.7 200 192C200 258.3 253.7 312 320 312zM290.3 368C191.8 368 112 447.8 112 546.3C112 562.7 125.3 576 141.7 576L498.3 576C514.7 576 528 562.7 528 546.3C528 447.8 448.2 368 349.7 368L290.3 368z" />
                    </svg></span>
                <span class="nav-text">Profile</span>
            </button>
        </nav>

    </div>


    <!-- Unified Bottom Sheet Root -->
    <div id="v3-bottom-sheet-overlay" class="v3-bottom-sheet-overlay" onclick="window.v3CloseBottomSheet(event)">
        <div class="v3-bottom-sheet" onclick="event.stopPropagation()">
            <div class="v3-sheet-handle"></div>
            <div class="v3-sheet-header-wrapper">
                <button class="v3-sheet-close-btn ripple" onclick="window.v3CloseBottomSheet(event)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <h2 id="v3-sheet-title" class="v3-sheet-header">Налаштування</h2>
                <div style="width: 36px;"></div>
            </div>
            <div id="v3-sheet-body" class="v3-sheet-content">
                <!-- Dynamic Content Injected Here -->
            </div>
        </div>
    </div>

    <!-- Toast Notification Root -->
    <div id="v3-toast-container" class="v3-toast-container">
        <div id="v3-toast-message" class="v3-toast"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script type="module" src="js/pages/cabinet-v3.js"></script>
</body>

</html>
