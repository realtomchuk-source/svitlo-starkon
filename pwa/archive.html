<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Архів графіків | Світло-Старкон</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <div class="glass-header">
            <h1 class="headline-hero">Архів</h1>
        </div>

        <main class="content-area">
            <section id="archive-section" class="fade-in">
                <!-- Month Selection -->
                <div class="glass-card" style="margin-bottom: 16px; padding: 16px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <button id="btn-prev-month" class="header-action-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </button>
                        <h2 id="current-month-year" style="margin: 0; font-size: 18px; font-weight: 700;">Березень 2026</h2>
                        <button id="btn-next-month" class="header-action-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Calendar Grid -->
                <div class="glass-card" style="padding: 16px; margin-bottom: 24px;">
                    <div class="calendar-weekdays" style="display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 12px; font-weight: 700; font-size: 12px; color: var(--system-text-neutral);">
                        <div>ПН</div><div>ВТ</div><div>СР</div><div>ЧТ</div><div>ПТ</div><div>СБ</div><div>НД</div>
                    </div>
                    <div id="calendar-grid" class="calendar-grid">
                        <!-- Days injected by JS -->
                    </div>
                </div>

                <!-- Results -->
                <div id="archive-results" style="display: none;">
                    <h3 id="archive-date-title" class="subheadline" style="margin-left: 8px;">11 березня</h3>
                    <div id="queue-accordions" style="display: flex; flex-direction: column; gap: 12px;">
                        <!-- Accordions injected here -->
                    </div>
                </div>
            </section>
        </main>

        <div style="height: 100px;"></div>

        <nav class="glass-nav">
            <button class="nav-item  focus-ring" onclick="window.location.href='index.html'">
                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
                <span class="nav-text">Home</span>
            </button>
            <button class="nav-item active focus-ring" onclick="window.location.href='full_schedule.html'">
                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg></span>
                <span class="nav-text">Graph</span>
            </button>
            <button class="nav-item  focus-ring" onclick="window.location.href='javascript:void(0)'">
                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg></span>
                <span class="nav-text">App</span>
            </button>
            <button class="nav-item  focus-ring" onclick="window.location.href='cabinet.html'">
                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                <span class="nav-text">Profile</span>
            </button>
        </nav>
    </div>

    <!-- Floating Scrubber Tooltip -->
    <div id="mini-scrubber-tooltip" class="mini-scrubber-tooltip" style="display: none;">
        <span id="tooltip-time">12:00</span>
        <span id="tooltip-status">Є світло</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script type="module" src="js/pages/archive.js"></script>
</body>

</html>
